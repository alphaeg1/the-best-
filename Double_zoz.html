<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOUBLE ZOZ - طعم مش هتلاقية في حتة تانية</title>
    <!-- استدعاء أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- استدعاء خط Cairo المتناسق مع اللغة العربية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #090909;
            background-image: radial-gradient(circle at 50% 10%, #200505 0%, #090909 70%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0px 15px 35px rgba(255, 0, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        /* الإطار البيضاوي للوجو */
        .header-image {
            width: 200px;
            height: 150px;
            background-color: transparent;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .header-image:hover {
            transform: scale(1.05);
        }

        .header-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* اللوجو والشعار */
        .logo-title {
            font-size: 32px;
            font-weight: 900;
            color: #e60000;
            letter-spacing: 1.5px;
            margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(230, 0, 0, 0.4);
        }
        
        .brand-name {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 25px;
            font-weight: 700;
        }

        /* أزرار السوشيال ميديا */
        .social-grid {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .social-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 4px;
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        
        .social-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(255, 0, 0, 0.2);
        }
        
        .social-btn i {
            font-size: 22px;
            margin-bottom: 6px;
        }

        /* ألوان السوشيال ميديا */
        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .tiktok {
            background: #000000;
            border: 1px solid #333;
        }
        .whatsapp {
            background: #25D366;
        }
        .facebook {
            background: #1877F2;
        }

        /* العناوين الأقسام */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #e60000;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .section-title::before, .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e60000, transparent);
        }
        
        /* قائمة الطعام */
        .menu-sections {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .menu-item {
            background: #1a1a1a;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            border-right: 4px solid #e60000;
            text-align: right;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .menu-item:hover {
            background: #222222;
            transform: translateX(-5px);
            border-right-color: #ff3333;
        }

        /* معلومات الاتصال */
        .contact-info {
            background: #1a1a1a;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        .contact-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: right;
        }
        
        .contact-link:hover {
            color: #e60000;
        }
        
        .contact-link i {
            color: #e60000;
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        /* زر الدعوة لإجراء فعل (طلب موقع) */
        .cta-website {
            display: block;
            background: linear-gradient(45deg, #e60000, #990000);
            color: #ffffff;
            padding: 14px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(230, 0, 0, 0.3);
            border: none;
        }
        
        .cta-website:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(230, 0, 0, 0.5);
            background: linear-gradient(45deg, #ff1a1a, #b30000);
        }
    </style>
</head>
