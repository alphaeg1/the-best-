<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Ten Woman's Wear</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #ffffff;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0;
        }

        /* حاوية الموبايل الرئيسية */
        .page-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 40px;
            position: relative;
        }

        /* البانر العلوي الفخم باللون الأسود */
        .brand-header {
            width: 100%;
            background-color: #000000;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* رسمة اللوجو العلوية المدمجة SVG بدقة ممتازة */
        .logo-svg {
            width: 90px;
            height: auto;
            margin-bottom: 10px;
        }

        .brand-header h1 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .brand-header p {
            color: #ffffff;
            font-size: 13px;
            letter-spacing: 3px;
            margin-top: 4px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.95;
        }

        /* عنوان الصفحة الرئيسي بعد الهيدر */
        .page-title {
            color: #1a73e8;
            font-size: 24px;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 10px;
        }

        .section-subtitle {
            font-size: 18px;
            font-weight: 600;
            color: #444444;
            margin-bottom: 25px;
        }

        /* شبكة أزرار السوشيال ميديا (4 أعمدة متطابقة) */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 90%;
            margin-bottom: 25px;
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 15px 5px;
            border-radius: 16px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .social-btn:active {
            transform: scale(0.95);
        }

        .social-btn i {
            font-size: 28px;
            margin-bottom: 8px;
        }

        /* ألوان أزرار شبكة التواصل الاجتماعي الأصلية */
        .btn-facebook {
            background: #1877f2;
        }

        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .btn-tiktok {
            background: #000000;
        }

        .btn-telegram {
            background: #24A1DE;
        }

        /* كروت العرض العريضة ذات الحواف الدائرية والظلال الناعمة */
        .wide-card {
            width: 90%;
            background: #ffffff;
            border-radius: 18px;
            padding: 18px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #333333;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease;
        }

        .wide-card:active {
            transform: scale(0.98);
        }

        /* الدائرة الرمادية المخصصة للأيقونات أو اللوجوهات الصغيرة داخل الكروت */
        .card-icon-circle {
            width: 48px;
            height: 48px;
            background-color: #f0f2f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .card-icon-circle i {
            font-size: 20px;
            color: #000000;
        }

        /* حاوية لوجو Team Alpha المدمج */
        .ta-logo-svg {
            width: 28px;
            height: auto;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .card-main-text {
            font-size: 17px;
            font-weight: 700;
            color: #000000;
            line-height: 1.3;
        }

        .card-sub-text {
            font-size: 13px;
            color: #777777;
            margin-top: 3px;
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="brand-header">
            <svg class="logo-svg" viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M30 35C20 35 15 25 25 18C35 11 48 20 50 35C52 42 52 48 51 54M51 32C51 30 55 25 60 26C68 28 73 18 64 12C55 6 48 18 51 32ZM51 32V54M47 42H55" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>TOP TEN</h1>
            <p>Woman's Wear</p>
        </div>

        <div class="page-title">Top Ten Woman's Wear</div>
        <div class="section-subtitle">تابعونا على</div>

        <div class="social-grid">
            <a href="https://facebook.com" class="social-btn btn-facebook" target="_blank">
                <i class="fab fa-facebook"></i>
                <span>facebook</span>
            </a>
            <a href="https://instagram.com" class="social-btn btn-instagram" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>instagram</span>
            </a>
            <a href="https://tiktok.com" class="social-btn btn-tiktok" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>tiktok</span>
            </a>
            <a href="https://t.me" class="social-btn btn-telegram" target="_blank">
                <i class="fab fa-telegram"></i>
                <span>telegram</span>
            </a>
        </div>

        <a href="tel:+201044800322" class="wide-card">
            <div class="card-icon-circle">
                <i class="fa-solid fa-phone"></i>
            </div>
            <div class="card-info">
                <span class="card-main-text" dir="ltr">+20 1044800322</span>
                <span class="card-sub-text">رقم الهاتف والواتساب</span>
            </div>
        </a>

        <a href="https://alpha30-pixel.github.io/template/p.html?id=510326" class="wide-card" target="_blank">
            <div class="card-icon-circle">
                <svg class="ta-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 25H55L43 80H26L31 55H15L10 25Z" fill="black"/>
                    <path d="M50 25H88L76 80H59L67 45H57L53 62H42L50 25Z" fill="black"/>
                    <path d="M43 45H71" stroke="white" stroke-width="6" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="card-info">
                <span class="card-main-text">لو عايز تعمل صفحه و QR</span>
                <span class="card-sub-text">اضغط هنا</span>
            </div>
        </a>

    </div>

</body>
</html>
