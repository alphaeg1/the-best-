<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Ten للملابس الحريمي </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        
        /* حاوية الصفحة الرئيسية المحاكية لشاشة الموبايل */
        .container {
            width: 100%;
            max-width: 480px;
            /* جعل الخلفية شبه شفافة لتظهر صورة الخلفية بجمالية ولتسهيل القراءة */
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            padding-bottom: 40px;
            text-align: center;
            overflow: hidden;
        }

        /* تنسيق الهيدر الجديد المخصص لعرض الصورة المعدلة بوضوح وبأبعادها الحقيقية */
        .top-banner {
            width: 100%;
            display: block;
        }

        .top-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* قسم العناوين والأزرار مع ضبط المسافات بعد إضافة الصورة بالأعلى */
        .content-section {
            padding: 20px 20px 10px 20px;
        }

        .brand-title {
            color: #2b78c9;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .follow-us {
            color: #666666;
            font-size: 18px;
            margin-bottom: 25px;
        }

        /* شبكة أزرار السوشيال ميديا (محدثة لتستوعب 5 أزرار متجاورة بشكل متناسق) */
        .social-grid {
            display: table;
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 6px;
            margin-bottom: 25px;
        }

        .social-item {
            display: table-cell;
            text-align: center;
            vertical-align: middle;
        }

        .social-btn {
            display: block;
            border-radius: 14px;
            padding: 12px 2px;
            color: #ffffff;
            text-decoration: none;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .social-btn:active {
            transform: scale(0.95);
        }

        .social-btn i {
            font-size: 22px;
            display: block;
            margin-bottom: 6px;
        }

        .social-btn span {
            font-size: 10px;
            display: block;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
        }

        /* ألوان أزرار السوشيال ميديا الحقيقية */
        .telegram { background: #2ca5e0; }
        .tiktok { background: #000000; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .facebook { background: #1877f2; }
        .whatsapp { background: #25D366; }

        /* الأزرار العريضة السفلية */
        .wide-card {
            display: block;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 18px;
            margin: 0 5px 15px 5px;
            padding: 18px 20px;
            text-decoration: none;
            color: #000000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(245, 245, 245, 0.8);
            transition: background-color 0.2s ease;
        }

        .wide-card:active {
            background-color: #fafafa;
        }

        /* تقسيم الأزرار العريضة باستخدام Table لتوزيع النصوص والأيقونة */
        .card-table {
            display: table;
            width: 100%;
        }

        .card-cell-text {
            display: table-cell;
            vertical-align: middle;
            text-align: right;
        }

        .card-cell-icon {
            display: table-cell;
            vertical-align: middle;
            text-align: left;
            width: 45px;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 13px;
            color: #888888;
        }

        /* تصميم الدائرة الرمادية للأيقونات السفلية */
        .icon-circle {
            width: 42px;
            height: 42px;
            background-color: #f1f3f4;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: #000000;
            font-size: 18px;
        }
        
        /* الشعار النصي الجديد TA الخاص بـ Team Alpha */
        .ta-icon {
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        /* التنسيق الجديد لقسم أقسام المول المضاف في الأسفل */
        .mall-sections {
            margin: 10px 5px 25px 5px;
            padding: 20px;
            background-color: rgba(252, 251, 249, 0.9);
            border-radius: 18px;
            border: 1px dashed #e3d3c4;
            text-align: right;
        }

        .mall-sections h3 {
            color: #2b2b2b;
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 15px;
            position: relative;
            padding-bottom: 5px;
            border-bottom: 2px solid #e3d3c4;
            display: inline-block;
        }

        .mall-list {
            list-style: none;
        }

        .mall-list li {
            font-size: 15px;
            color: #444444;
            padding: 8px 0;
            border-bottom: 1px solid #f1f1f1;
            font-weight: 500;
        }

        .mall-list li:last-child {
            border-bottom: none;
        }
    </style>
</head>
