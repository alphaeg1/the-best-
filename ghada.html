<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة غادة عبد الله</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --header-bg: #f8f9fa;
            --accent-color: #007bff;
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1f1f1f;
            --accent-color: #4dabf7;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: 0.3s;
        }

        header {
            background-color: var(--header-bg);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            background: transparent;
            color: var(--text-color);
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }

        .course-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .whatsapp-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div style="width:35px; height:35px; background:var(--accent-color); border-radius:50%; color:white; display:flex; align-items:center; justify-content:center;">G</div>
        منصة غادة عبد الله
    </div>
    <div>
        <button class="theme-toggle" id="toggleBtn">الوضع الداكن</button>
        <button style="margin-right:10px; background:var(--accent-color); color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer;">دخول</button>
    </div>
</header>

<div style="text-align:center; padding:50px 0; background: linear-gradient(135deg, var(--accent-color), #6610f2); color:white;">
    <h1> مستقبلك التعليمي</h1>
    <p>كل اللي محتاجه في مكان واحد</p>
</div>

<div class="course-grid">
    <div class="course-card">
        <h3>لغة عربية</h3>
        <p>شرح كامل للمنهج</p>
        <button style="background:var(--accent-color); color:white; border:none; padding:10px; border-radius:5px; width:100%;">عرض الكورس</button>
    </div>
    <div class="course-card">
        <h3>فيزياء</h3>
        <p>حل وتدريبات مكثفة</p>
        <button style="background:var(--accent-color); color:white; border:none; padding:10px; border-radius:5px; width:100%;">عرض الكورس</button>
    </div>
</div>

<a href="https://wa.me/201234567890" class="whatsapp-btn" target="_blank">📱</a>

<script>
    const btn = document.getElementById('toggleBtn');
    btn.onclick = () => {
        const currentTheme = document.body.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            document.body.removeAttribute('data-theme');
            btn.innerText = 'الوضع الداكن';
        } else {
            document.body.setAttribute('data-theme', 'dark');
            btn.innerText = 'الوضع الفاتح';
        }
    };
</script>

</body>
</html>
