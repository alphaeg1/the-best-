<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Plus - محل تلفونات</title>
    <!-- استدعاء مكتبة الأيقونات الشهيرة Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 550px; /* حجم متناسق لاحتواء الأزرار الأربعة بجانب بعضها */
            width: 100%;
        }

        /* ستيل اللوجو واسم المحل */
        .header {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* مكان الصورة في أعلى الصفحة باللون البرتقالي */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
            border: 3px solid #ff4500; 
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.4);
        }

        .header h1 {
            font-size: 2.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            /* التدرج البرتقالي المتناسق مع شعارك */
            background: linear-gradient(45deg, #ff8c00, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: #aaa;
            font-size: 0.95rem;
        }

        /* قسم أرقام التليفونات */
        .phones-section {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #2a2a2a;
        }

        .phones-section h3 {
            margin-bottom: 12px;
            color: #ff8c00; /* اللون البرتقالي للعنوان */
            font-size: 1.05rem;
        }

        .phone-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #2a2a2a;
            color: #fff;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 10px;
            margin: 5px;
            font-size: 0.95rem;
            transition: 0.3s ease;
        }

        .phone-btn:hover {
            background-color: #ff4500; /* يتحول للبرتقالي عند التمرير */
        }

        /* شبكة كروت السوشيال ميديا - الأربعة بجانب بعضهم */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* تقسيم متساوي لـ 4 أعمدة بجانب بعضها */
            gap: 10px; /* مسافات صغيرة ومناسبة للتصغير */
            width: 100%;
        }

        .social-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90px; /* تم تصغير الارتفاع لتصبح الكروت ناعمة وأنيقة */
            border-radius: 16px; /* حواف دائرية متناسقة مع الحجم الصغير */
            text-decoration: none;
            color: white;
            font-size: 0.8rem; /* تصغير حجم الخط ليتناسب مع العرض المتاح */
            font-weight: 500;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .social-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .social-card i {
            font-size: 1.6rem; /* تصغير حجم الأيقونات */
            margin-bottom: 5px;
        }

        /* ألوان الكروت وتدرجاتها الرسمية */
        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .tiktok {
            background-color: #000000;
            border: 1px solid #2a2a2a;
        }

        .whatsapp {
            background-color: #25D366;
        }

        .facebook {
            background-color: #1877F2;
        }

        /* لضمان مظهر ممتاز على الشاشات الصغيرة جداً (الموبايل القديم مثلاً) */
        @media (max-width: 400px) {
            .social-grid {
                gap: 5px;
            }
            .social-card {
                height: 80px;
                font-size: 0.75rem;
            }
            .social-card i {
                font-size: 1.3rem;
            }
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- هيدر الموقع مع مكان الصورة المخصص بالبرتقالي -->
        <div class="header">
            <!-- استبدل logo.png برابط صورتك الشخصية أو لوجو المحل -->
            <img src="logo.png" alt="Pro Plus Logo" class="profile-img">
            
            <h1>PRO PLUS</h1>
            <p>عالم الهواتف الذكية وإكسسواراتها</p>
        </div>

        <!-- قسم أرقام التليفونات -->
        <div class="phones-section">
            <h3>اتصل بنا مباشرة</h3>
            <a href="tel:011111111" class="phone-btn">
                <i class="fa-solid fa-phone"></i> 011111111
            </a>
            <a href="tel:0222222" class="phone-btn">
                <i class="fa-solid fa-phone"></i> 0222222
            </a>
        </div>

        <!-- شبكة أزرار السوشيال ميديا الأربعة بجانب بعضهم -->
        <div class="social-grid">
            
            <!-- إنستغرام -->
            <a href="https://instagram.com/YOUR_USERNAME" target="_blank" class="social-card instagram">
                <i class="fa-brands fa-instagram"></i>
                <span>instagram</span>
            </a>

            <!-- تيك توك -->
            <a href="https://tiktok.com/@YOUR_USERNAME" target="_blank" class="social-card tiktok">
                <i class="fa-brands fa-tiktok"></i>
                <span>tiktok</span>
            </a>

            <!-- واتساب -->
            <a href="https://wa.me/20111111111" target="_blank" class="social-card whatsapp">
                <i class="fa-brands fa-whatsapp"></i>
                <span>whatsapp</span>
            </a>

            <!-- فيسبوك -->
            <a href="https://facebook.com/YOUR_PAGE" target="_blank" class="social-card facebook">
                <i class="fa-brands fa-facebook-f"></i>
                <span>facebook</span>
            </a>

        </div>
    </div>

</body>
</html>
