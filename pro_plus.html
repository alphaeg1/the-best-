<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Plus - محل تلفونات</title>
    <!-- استدعاء مكتبة الأيقونات الشهيرة Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px; /* تم تصغير العرض الأقصى ليتناسب مع الأزرار الأصغر */
            width: 100%;
        }

        /* ستيل اللوجو واسم المحل */
        .header {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* مكان الصورة المضاف في أعلى الصفحة */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #00c6ff;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.4);
        }

        .header h1 {
            font-size: 2.5rem; /* تصغير حجم العنوان قليلاً للتناسق */
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: #888;
            font-size: 1rem;
        }

        /* قسم أرقام التليفونات */
        .phones-section {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #2a2a2a;
        }

        .phones-section h3 {
            margin-bottom: 12px;
            color: #00c6ff;
            font-size: 1.1rem;
        }

        .phone-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #2a2a2a;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 10px;
            margin: 5px;
            font-size: 1rem;
            transition: 0.3s ease;
        }

        .phone-btn:hover {
            background-color: #0072ff;
        }

        /* شبكة كروت السوشيال ميديا بعد تصغيرها */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); /* تصغير عرض الكارت الأدنى */
            gap: 15px; /* تقليص المسافات بين الكروت */
            width: 100%;
        }

        .social-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 105px; /* تم تصغير الارتفاع من 140px إلى 105px */
            border-radius: 18px; /* حواف دائرية متناسقة مع الحجم الجديد */
            text-decoration: none;
            color: white;
            font-size: 0.9rem; /* تصغير حجم النص */
            font-weight: 500;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .social-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        .social-card i {
            font-size: 1.8rem; /* تم تصغير حجم الأيقونة من 2.5rem إلى 1.8rem */
            margin-bottom: 6px;
        }

        /* ألوان الكروت وتدرجاتها بناءً على الهوية الرسمية */
        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .tiktok {
            background-color: #000000;
            border: 1px solid #2a2a2a;
        }

        .whatsapp {
            background-color: #25D366;
        }

        .facebook {
            background-color: #1877F2;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- هيدر الموقع مع مكان الصورة المخصص -->
        <div class="header">
            <!-- استبدل logo.png برابط صورتك أو اسم ملف الصورة المرفق مع الكود -->
            <img src="logo.png" alt="Pro Plus Logo" class="profile-img">
            
            <h1>PRO PLUS</h1>
            <p>عالم الهواتف الذكية وإكسسواراتها</p>
        </div>

        <!-- قسم أرقام التليفونات -->
        <div class="phones-section">
            <h3>اتصل بنا مباشرة</h3>
            <a href="tel:011111111" class="phone-btn">
                <i class="fa-solid fa-phone"></i> 011111111
            </a>
            <a href="tel:0222222" class="phone-btn">
                <i class="fa-solid fa-phone"></i> 0222222
            </a>
        </div>

        <!-- شبكة أزرار السوشيال ميديا بعد التصغير -->
        <div class="social-grid">
            
            <!-- إنستغرام -->
            <a href="https://instagram.com/YOUR_USERNAME" target="_blank" class="social-card instagram">
                <i class="fa-brands fa-instagram"></i>
                <span>instagram</span>
            </a>

            <!-- تيك توك -->
            <a href="https://tiktok.com/@YOUR_USERNAME" target="_blank" class="social-card tiktok">
                <i class="fa-brands fa-tiktok"></i>
                <span>tiktok</span>
            </a>

            <!-- واتساب -->
            <a href="https://wa.me/20111111111" target="_blank" class="social-card whatsapp">
                <i class="fa-brands fa-whatsapp"></i>
                <span>whatsapp</span>
            </a>

            <!-- فيسبوك -->
            <a href="https://facebook.com/YOUR_PAGE" target="_blank" class="social-card facebook">
                <i class="fa-brands fa-facebook-f"></i>
                <span>facebook</span>
            </a>

        </div>
    </div>

</body>
</html>
